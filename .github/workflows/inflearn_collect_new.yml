name: Inflearn - Collect New Courses

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: inflearn-collect-new
  cancel-in-progress: false

jobs:
  collect_new:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download Go modules
        run: |
          go mod download

      - name: Build
        run: |
          go build ./...

      - name: Collect new Inflearn courses and publish Kafka events
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_SECURE: ${{ secrets.CH_SECURE }}
          CH_DATABASE: Data_Lecture_Inflearn_Raw
          CH_RAW_DATABASE: Data_Lecture_Inflearn_Raw
          CH_SERVICE_DATABASE: Data_Lecture_Inflearn_Service
          CH_LOG_DATABASE: Data_Lecture_Inflearn_Log
          CH_MART_DATABASE: Data_Lecture_Inflearn_Mart
          INGEST_MODE: kafka
          LECTURE_PROVIDER: inflearn
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD }}
          KAFKA_TOPIC: lecture.events
          KAFKA_CLIENT_ID: statground-inflearn-collect-new
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          BATCH_SIZE: "100"
          MAX_URLS_PER_RUN: "1500"
          CHECKPOINT_FLUSH_EVERY: "200"
          REQUEST_SLEEP_MIN: "0.2"
          REQUEST_SLEEP_MAX: "0.6"
        run: |
          go run ./cmd/inflearn-collect-new
