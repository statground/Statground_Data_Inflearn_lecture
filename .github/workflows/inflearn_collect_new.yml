name: Inflearn - Collect New Courses

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: inflearn-collect-new
  cancel-in-progress: false

jobs:
  collect_new:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          go build ./...

      - name: Collect new courses (batch)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          CH_SECURE: ${{ secrets.CH_SECURE }}
          BATCH_SIZE: "100"
          MAX_URLS_PER_RUN: "1500"
          CHECKPOINT_FLUSH_EVERY: "200"
          REQUEST_SLEEP_MIN: "0.2"
          REQUEST_SLEEP_MAX: "0.6"
        run: |
          go run ./cmd/inflearn-collect-new

      - name: Optimize tables (FINAL)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          CH_SECURE: ${{ secrets.CH_SECURE }}
          OPTIMIZE_MONTHS: "2"
        run: |
          go run ./cmd/inflearn-optimize

  stats_report:
    needs: collect_new
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: inflearn-stats-report
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate stats report (md + svg)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          CH_SECURE: ${{ secrets.CH_SECURE }}
          STATS_LOOKBACK_DAYS: "365"
        run: |
          go run ./cmd/inflearn-stats

      - name: Commit reports
        env:
          STATS_COMMIT_MESSAGE: "chore(stats): inflearn report update after collect_new batch"
        run: |
          bash scripts/inflearn_commit_reports.sh
