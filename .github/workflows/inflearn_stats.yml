name: inflearn_stats

on:
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: inflearn-stats
  cancel-in-progress: true

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Korean font for charts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          fc-cache -fv

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install clickhouse-connect matplotlib; fi

      - name: Generate stats report (md + charts)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          STATS_LOOKBACK_DAYS: "365"
        run: |
          python scripts/inflearn_stats.py

      - name: Optimize tables (FINAL)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          OPTIMIZE_MONTHS: "2"
        run: |
          python scripts/inflearn_optimize.py

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/inflearn || true
          if git diff --cached --quiet; then
            echo "No report changes."
            exit 0
          fi
          git commit -m "chore(stats): inflearn report update"
          git push