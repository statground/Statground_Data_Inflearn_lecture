name: Inflearn - Collect All Courses

on:
  schedule:
    - cron: "5 */12 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  STATE_DIR: .statground_state

concurrency:
  group: inflearn-collector-all
  cancel-in-progress: true

jobs:
  collect_all:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore crawler state
        uses: actions/cache/restore@v4
        with:
          path: .statground_state
          key: inflearn-crawler-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            inflearn-crawler-state-${{ github.ref_name }}-
            inflearn-crawler-state-

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate required repository secrets
        env:
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
        run: |
          test -n "$KAFKA_BROKERS" || { echo "KAFKA_BROKERS secret is required"; exit 1; }
          test -n "$KAFKA_USERNAME" || { echo "Kafka SASL username is required. Add either KAFKA_USERNAME or KAFKA_EXTERNAL_USER repository secret"; exit 1; }
          test -n "$KAFKA_PASSWORD" || { echo "Kafka SASL password is required. Add either KAFKA_PASSWORD or KAFKA_EXTERNAL_PASSWORD repository secret"; exit 1; }
          python3 - <<'PY'
          import hashlib
          import os

          brokers = os.environ.get("KAFKA_BROKERS", "")
          safe = brokers.replace(".", "[.]").replace(":", "[:]").replace(",", ", ")
          print(f"KAFKA_BROKERS_SANITIZED={safe}")
          print(f"KAFKA_BROKERS_SHA256={hashlib.sha256(brokers.encode()).hexdigest()}")
          PY
          case ",$KAFKA_BROKERS," in
            *,180.66.240.243:50004,*)
              echo "KAFKA_BROKERS still contains old broker endpoint 180.66.240.243:50004"
              exit 1
              ;;
            *,127.0.0.1:*|*,localhost:*|*,0.0.0.0:*|*,[::1]:*)
              echo "KAFKA_BROKERS must be a public IP/domain endpoint, not a loopback address"
              exit 1
              ;;
          esac

      - name: Resolve Go modules and checksums
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download all
          go mod verify

      - name: Build active Inflearn crawler commands
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go build -mod=mod ./cmd/inflearn-collect-new ./cmd/inflearn-update-existing ./cmd/inflearn-collect-urls

      - name: Run unit tests
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: go test -mod=mod ./...

      - name: Collect new Inflearn courses and publish Kafka events
        env:
          STATE_BACKEND: local
          STATE_DIR: .statground_state
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_SERVICE_DATABASE: Data_Lecture_Inflearn_Service
          INGEST_MODE: kafka
          LECTURE_PROVIDER: inflearn
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: lecture.events
          KAFKA_CLIENT_ID: statground-inflearn-collect-new
          KAFKA_WRITE_ATTEMPTS: "8"
          KAFKA_WRITE_BACKOFF_MIN: "1.0"
          KAFKA_WRITE_BACKOFF_MAX: "20.0"
          KAFKA_PARTITION_FALLBACK_ENABLED: "true"
          KAFKA_PARTITION_FALLBACK_TIMEOUT_SECONDS: "8.0"
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          BATCH_SIZE: "100"
          MAX_URLS_PER_RUN: "1500"
          CHECKPOINT_FLUSH_EVERY: "200"
          INFLEARN_RECENT_HEAD_ENABLED: "true"
          INFLEARN_RECENT_HEAD_PAGES: "5"
          INFLEARN_RECENT_HEAD_PAGE_SIZE: "100"
          INFLEARN_RECENT_HEAD_SORT: RECENT
          INFLEARN_RECENT_HEAD_TYPES: ONLINE
          INFLEARN_RECENT_SEARCH_BASE_URL: https://course-api.inflearn.com
          INFLEARN_COURSE_API_BASE_URL: https://course-api.inflearn.com
          REQUEST_SLEEP_MIN: "0.2"
          REQUEST_SLEEP_MAX: "0.6"
        run: |
          go run -mod=mod ./cmd/inflearn-collect-new

      - name: Update existing Inflearn courses and publish Kafka events
        env:
          STATE_BACKEND: local
          STATE_DIR: .statground_state
          INGEST_MODE: kafka
          LECTURE_PROVIDER: inflearn
          KAFKA_BROKERS: ${{ secrets.KAFKA_BROKERS2 || secrets.KAFKA_BROKERS }}
          KAFKA_USERNAME: ${{ secrets.KAFKA_USERNAME2 || secrets.KAFKA_USERNAME || secrets.KAFKA_EXTERNAL_USER }}
          KAFKA_PASSWORD: ${{ secrets.KAFKA_PASSWORD2 || secrets.KAFKA_PASSWORD || secrets.KAFKA_EXTERNAL_PASSWORD }}
          KAFKA_TOPIC: lecture.events
          KAFKA_CLIENT_ID: statground-inflearn-update-existing
          KAFKA_WRITE_ATTEMPTS: "8"
          KAFKA_WRITE_BACKOFF_MIN: "1.0"
          KAFKA_WRITE_BACKOFF_MAX: "20.0"
          KAFKA_PARTITION_FALLBACK_ENABLED: "true"
          KAFKA_PARTITION_FALLBACK_TIMEOUT_SECONDS: "8.0"
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          UPDATE_BATCH_SIZE: "100"
          WORKERS: "8"
          REQUEST_SLEEP_MIN: "0.2"
          REQUEST_SLEEP_MAX: "0.6"
        run: |
          go run -mod=mod ./cmd/inflearn-update-existing

      - name: Refresh MirType provider practice content
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
        run: |
          if [ -z "$CH_HOST" ] || [ -z "$CH_USER" ] || [ -z "$CH_PASSWORD" ]; then
            echo "Skipping MirType provider practice content refresh because ClickHouse secrets are not configured"
            exit 0
          fi
          CH_PORT="${CH_PORT:-8123}"
          CH_PROTOCOL="${CH_PROTOCOL:-http}"
          CH_BASE_URL="${CH_PROTOCOL}://${CH_HOST}:${CH_PORT}/${CH_HTTP_URL_PATH}"
          curl --fail --silent --show-error --max-time 300 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SYSTEM REFRESH VIEW mirtype_content.mv_provider_practice_content_refresh"
          curl --fail --silent --show-error --max-time 60 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SELECT * FROM mirtype_content.v_provider_practice_content_current FORMAT TSVWithNames"

      - name: Save crawler state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .statground_state
          key: inflearn-crawler-state-${{ github.ref_name }}-${{ github.run_id }}-${{ github.run_attempt }}
