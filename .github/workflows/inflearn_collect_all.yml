name: Inflearn - Collect and Translate

on:
  schedule:
    - cron: "5 */12 * * *"
  workflow_dispatch:
    inputs:
      languages:
        description: "Comma-separated Statground UI language codes"
        required: false
        default: "ko,en,ja,zh-Hans,zh-Hant,es,fr,de,pt-BR,ru,id,vi,th,ms,fil,hi,ar,it,nl,pl,sv,tr,uk"
      max_per_run:
        description: "Maximum translation rows per run"
        required: false
        default: "80"
      course_ids:
        description: "Optional comma-separated Inflearn course IDs for a narrow backfill"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: inflearn-collector-all
  cancel-in-progress: true

jobs:
  collect_all:
    runs-on: ubuntu-latest
    timeout-minutes: 100
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate required ClickHouse repository secrets
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
        run: |
          test -n "$CH_HOST" || { echo "CH_HOST or CLICKHOUSE_HOST secret is required"; exit 1; }
          test -n "$CH_USER" || { echo "CH_USER or CLICKHOUSE_USER secret is required"; exit 1; }
          test -n "$CH_PASSWORD" || { echo "CH_PASSWORD or CLICKHOUSE_PASSWORD secret is required"; exit 1; }
          python3 - <<'PY'
          import hashlib
          import os

          host = os.environ.get("CH_HOST", "")
          print(f"CH_HOST_SHA256={hashlib.sha256(host.encode()).hexdigest()}")
          PY

      - name: Resolve Go modules and checksums
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go mod download all
          go mod verify

      - name: Build active Inflearn commands
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: |
          go build -mod=mod ./cmd/inflearn-collect-new ./cmd/inflearn-update-existing ./cmd/inflearn-collect-urls ./cmd/inflearn-translate-display

      - name: Run unit tests
        env:
          GOPROXY: https://proxy.golang.org,direct
        run: go test -mod=mod ./...

      - name: Collect new Inflearn courses into ClickHouse
        env:
          STATE_BACKEND: clickhouse
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_RAW_DATABASE: Data_Lecture_Inflearn_Raw
          CH_SERVICE_DATABASE: Data_Lecture_Inflearn_Service
          INGEST_MODE: clickhouse
          CH_INSERT_CHUNK_SIZE: "100"
          CH_INSERT_TIMEOUT_SECONDS: "300"
          CH_INSERT_DISTRIBUTED_SYNC: "false"
          LECTURE_PROVIDER: inflearn
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          BATCH_SIZE: "100"
          MAX_URLS_PER_RUN: "1500"
          CHECKPOINT_FLUSH_EVERY: "200"
          INFLEARN_RECENT_HEAD_ENABLED: "true"
          INFLEARN_RECENT_HEAD_PAGES: "5"
          INFLEARN_RECENT_HEAD_PAGE_SIZE: "100"
          INFLEARN_RECENT_HEAD_SORT: RECENT
          INFLEARN_RECENT_HEAD_TYPES: ONLINE
          INFLEARN_RECENT_SEARCH_BASE_URL: https://course-api.inflearn.com
          INFLEARN_COURSE_API_BASE_URL: https://course-api.inflearn.com
          REQUEST_SLEEP_MIN: "0.2"
          REQUEST_SLEEP_MAX: "0.6"
        run: |
          go run -mod=mod ./cmd/inflearn-collect-new

      - name: Update existing Inflearn courses in ClickHouse
        env:
          STATE_BACKEND: clickhouse
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_RAW_DATABASE: Data_Lecture_Inflearn_Raw
          CH_SERVICE_DATABASE: Data_Lecture_Inflearn_Service
          INGEST_MODE: clickhouse
          CH_INSERT_CHUNK_SIZE: "100"
          CH_INSERT_TIMEOUT_SECONDS: "300"
          CH_INSERT_DISTRIBUTED_SYNC: "false"
          LECTURE_PROVIDER: inflearn
          PRODUCER_SOURCE: github_actions
          PRODUCER_IP: "::"
          UPDATE_BATCH_SIZE: "100"
          WORKERS: "8"
          REQUEST_SLEEP_MIN: "0.2"
          REQUEST_SLEEP_MAX: "0.6"
        run: |
          go run -mod=mod ./cmd/inflearn-update-existing

      - name: Refresh MirType provider practice content
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_PROTOCOL: ${{ secrets.CLICKHOUSE_PROTOCOL || secrets.CH_PROTOCOL || 'http' }}
          CH_HTTP_URL_PATH: ${{ secrets.CLICKHOUSE_HTTP_URL_PATH || secrets.CH_HTTP_URL_PATH }}
        run: |
          if [ -z "$CH_HOST" ] || [ -z "$CH_USER" ] || [ -z "$CH_PASSWORD" ]; then
            echo "Skipping MirType provider practice content refresh because ClickHouse secrets are not configured"
            exit 0
          fi
          CH_PORT="${CH_PORT:-8123}"
          CH_PROTOCOL="${CH_PROTOCOL:-http}"
          CH_BASE_URL="${CH_PROTOCOL}://${CH_HOST}:${CH_PORT}/${CH_HTTP_URL_PATH}"
          REFRESH_LOG="$(mktemp)"
          if ! curl --fail --silent --show-error --max-time 300 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SYSTEM REFRESH VIEW mirtype_content.mv_provider_practice_content_refresh" >"$REFRESH_LOG" 2>&1; then
            if grep -E "TABLE_IS_READ_ONLY|KEEPER_EXCEPTION|Coordination error|Connection loss" "$REFRESH_LOG" >/dev/null; then
              echo "Skipping MirType provider practice content refresh because ClickHouse replicated tables are temporarily read-only"
              exit 0
            fi
            cat "$REFRESH_LOG"
            exit 1
          fi
          curl --fail --silent --show-error --max-time 60 -u "$CH_USER:$CH_PASSWORD" "$CH_BASE_URL" --data-binary "SELECT * FROM mirtype_content.v_provider_practice_content_current FORMAT TSVWithNames"

      - name: Translate missing display metadata
        env:
          CH_HOST: ${{ secrets.CH_HOST || secrets.CLICKHOUSE_HOST }}
          CH_PORT: ${{ secrets.CH_PORT || secrets.CLICKHOUSE_PORT }}
          CH_USER: ${{ secrets.CH_USER || secrets.CLICKHOUSE_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD || secrets.CLICKHOUSE_PASSWORD }}
          CH_SERVICE_DATABASE: Data_Lecture_Inflearn_Service
          INFLEARN_TRANSLATION_API_KEY: ${{ secrets.INFLEARN_TRANSLATION_API_KEY || secrets.OPENAI_API_KEY || secrets.GH_MODELS_API_KEY || secrets.GITHUB_MODELS_API_KEY }}
          GH_MODELS_API_KEY: ${{ secrets.GH_MODELS_API_KEY || secrets.GITHUB_MODELS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          INFLEARN_TRANSLATION_PROVIDER: ${{ vars.INFLEARN_TRANSLATION_PROVIDER }}
          INFLEARN_TRANSLATION_MODEL: ${{ vars.INFLEARN_TRANSLATION_MODEL }}
          INFLEARN_TRANSLATION_TARGET_LANGS_INPUT: ${{ github.event.inputs.languages }}
          INFLEARN_TRANSLATION_MAX_PER_RUN_INPUT: ${{ github.event.inputs.max_per_run }}
          INFLEARN_TRANSLATION_COURSE_IDS: ${{ github.event.inputs.course_ids }}
          INFLEARN_TRANSLATION_BATCH_SIZE: "12"
        run: |
          if [ -z "$CH_HOST" ] || [ -z "$CH_USER" ]; then
            echo "ClickHouse secrets are not configured; skipping translation run."
            exit 0
          fi
          if [ -z "$INFLEARN_TRANSLATION_API_KEY" ] && [ -z "$OPENAI_API_KEY" ] && [ -z "$GH_MODELS_API_KEY" ]; then
            echo "Translation API key is not configured; skipping translation run."
            exit 0
          fi
          export INFLEARN_TRANSLATION_TARGET_LANGS="${INFLEARN_TRANSLATION_TARGET_LANGS_INPUT:-ko,en,ja,zh-Hans,zh-Hant,es,fr,de,pt-BR,ru,id,vi,th,ms,fil,hi,ar,it,nl,pl,sv,tr,uk}"
          export INFLEARN_TRANSLATION_MAX_PER_RUN="${INFLEARN_TRANSLATION_MAX_PER_RUN_INPUT:-80}"
          TRANSLATION_LOG="$(mktemp)"
          if ! go run -mod=mod ./cmd/inflearn-translate-display >"$TRANSLATION_LOG" 2>&1; then
            if grep -E "TABLE_IS_READ_ONLY|KEEPER_EXCEPTION|Coordination error|Connection loss" "$TRANSLATION_LOG" >/dev/null; then
              echo "Skipping display translation because ClickHouse replicated tables are temporarily read-only"
              exit 0
            fi
            cat "$TRANSLATION_LOG"
            exit 1
          fi
          cat "$TRANSLATION_LOG"
