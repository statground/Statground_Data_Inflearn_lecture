name: Inflearn Lecture Crawl

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours (UTC)

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run crawler
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}

          SITEMAP_BASE: "https://cdn.inflearn.com/sitemaps"
          SITEMAP_PREFIX: "sitemap-courseDetail-"

          # Batch processing (avoid timeouts / bans). Set to 0 to attempt "no limit"
          BATCH_SIZE: "800"
          REQUEST_SLEEP_MIN: "0.6"
          REQUEST_SLEEP_MAX: "1.3"
        run: |
          python scripts/inflearn_crawl.py
