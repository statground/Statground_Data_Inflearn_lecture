name: Inflearn Lecture Crawl

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run crawler
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          SITEMAP_BASE: "https://cdn.inflearn.com/sitemaps"
          SITEMAP_PREFIX: "sitemap-courseDetail-"
          MAX_SITEMAP_INDEX: "200"
          MAX_COURSES_PER_RUN: "200"
          REQUEST_SLEEP_MIN: "0.6"
          REQUEST_SLEEP_MAX: "1.3"
        run: |
          python scripts/inflearn_crawl.py
