name: Inflearn - Update Existing Courses

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: inflearn-update-existing
  cancel-in-progress: false

jobs:
  update_existing:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          go build ./...

      - name: Update existing courses (batch)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          CH_SECURE: ${{ secrets.CH_SECURE }}
          UPDATE_BATCH_SIZE: "100"
          WORKERS: "8"
          REQUEST_SLEEP_MIN: "0.2"
          REQUEST_SLEEP_MAX: "0.6"
        run: |
          go run ./cmd/inflearn-update-existing

      - name: Optimize tables (FINAL)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          CH_SECURE: ${{ secrets.CH_SECURE }}
          OPTIMIZE_MONTHS: "2"
        run: |
          go run ./cmd/inflearn-optimize

  stats_report:
    needs: update_existing
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    concurrency:
      group: inflearn-stats-report
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Generate stats report (md + svg)
        env:
          CH_HOST: ${{ secrets.CH_HOST }}
          CH_PORT: ${{ secrets.CH_PORT }}
          CH_USER: ${{ secrets.CH_USER }}
          CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
          CH_DATABASE: ${{ secrets.CH_DATABASE }}
          CH_SECURE: ${{ secrets.CH_SECURE }}
          STATS_LOOKBACK_DAYS: "365"
        run: |
          go run ./cmd/inflearn-stats

      - name: Commit reports
        env:
          STATS_COMMIT_MESSAGE: "chore(stats): inflearn report update after update_existing batch"
        run: |
          bash scripts/inflearn_commit_reports.sh
