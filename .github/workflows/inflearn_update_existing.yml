name: Inflearn - Update Existing Courses

on:
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: inflearn-inflearn_update_existing.py
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      CH_HOST: ${{ secrets.CH_HOST }}
      CH_PORT: ${{ secrets.CH_PORT }}
      CH_USER: ${{ secrets.CH_USER }}
      CH_PASSWORD: ${{ secrets.CH_PASSWORD }}
      CH_DATABASE: ${{ secrets.CH_DATABASE }}
      # crawler tuning
      REQUEST_SLEEP_MIN: "0.6"
      REQUEST_SLEEP_MAX: "1.3"
      BATCH_SIZE: "800"
      UPDATE_BATCH_SIZE: "400"
      OPTIMIZE_MONTHS: "2"
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run
      run: |
        python scripts/inflearn_update_existing.py
    - name: Merge FINAL (recent partitions)
      if: always()
      run: |
        python scripts/inflearn_optimize.py
